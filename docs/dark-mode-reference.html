<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOSG Dark Mode Reference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; padding: 16px; transition: background .3s, color .3s; }
  body.light { background: #FBF9F7; color: #111827; }
  body.dark { background: #1A1A2E; color: #F0EDE8; }
  .toggle-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .toggle-bar button { padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .light .toggle-bar button { background: #F3F4F6; color: #374151; }
  .dark .toggle-bar button { background: #2C2C42; color: #D1CFC8; }
  .toggle-bar button.active { outline: 2px solid; }
  .light .toggle-bar button.active { outline-color: #0F766E; background: #F0FDFA; color: #0F766E; }
  .dark .toggle-bar button.active { outline-color: #2DD4BF; background: rgba(45,212,191,0.12); color: #5EEAD4; }

  .card { border-radius: 12px; padding: 14px; margin-bottom: 12px; transition: background .3s, border-color .3s; }
  .light .card { background: #FFFFFF; border: 0.5px solid #E5E7EB; }
  .dark .card { background: #232338; border: 0.5px solid rgba(255,255,255,0.08); }

  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; }
  .light .sub { color: #6B7280; }
  .dark .sub { color: #9A9790; }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .light .badge-teal { background: #F0FDFA; color: #0F766E; }
  .dark .badge-teal { background: rgba(45,212,191,0.12); color: #5EEAD4; }
  .light .badge-red { background: #FEF2F2; color: #DC2626; }
  .dark .badge-red { background: rgba(248,113,113,0.12); color: #FCA5A5; }
  .light .badge-amber { background: #FFFBEB; color: #92400E; }
  .dark .badge-amber { background: rgba(251,191,36,0.12); color: #FCD34D; }
  .light .badge-green { background: #ECFDF5; color: #059669; }
  .dark .badge-green { background: rgba(52,211,153,0.12); color: #6EE7B7; }

  .btn-primary { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; width: 100%; }
  .light .btn-primary { background: #0F766E; color: #FFFFFF; }
  .dark .btn-primary { background: #2DD4BF; color: #1A1A2E; }

  .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat { flex: 1; border-radius: 8px; padding: 10px; text-align: center; }
  .light .stat { background: #F5F3F0; }
  .dark .stat { background: #2C2C42; }
  .stat-n { font-size: 20px; font-weight: 700; }
  .stat-l { font-size: 10px; font-weight: 500; }
  .light .stat-l { color: #9CA3AF; }
  .dark .stat-l { color: #6B6860; }

  .nav { display: flex; justify-content: space-around; border-radius: 12px; padding: 8px; margin-top: 12px; }
  .light .nav { background: #FFFFFF; border: 0.5px solid #E5E7EB; }
  .dark .nav { background: #232338; border: 0.5px solid rgba(255,255,255,0.08); }
  .nav-item { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 8px; }
  .light .nav-item { color: #9CA3AF; }
  .dark .nav-item { color: #6B6860; }
  .light .nav-item.active { background: #F0FDFA; color: #0F766E; font-weight: 700; }
  .dark .nav-item.active { background: rgba(45,212,191,0.12); color: #5EEAD4; font-weight: 700; }

  .session-card { display: flex; gap: 10px; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
  .light .session-card { background: #FFFFFF; border-left: 3px solid #14B8A6; border-top: 0.5px solid #E5E7EB; border-right: 0.5px solid #E5E7EB; border-bottom: 0.5px solid #E5E7EB; }
  .dark .session-card { background: #232338; border-left: 3px solid #2DD4BF; border-top: 0.5px solid rgba(255,255,255,0.06); border-right: 0.5px solid rgba(255,255,255,0.06); border-bottom: 0.5px solid rgba(255,255,255,0.06); }
</style>
</head>
<body class="light">
  <div class="toggle-bar">
    <button class="active" onclick="setMode('light')">Light</button>
    <button onclick="setMode('dark')">Dark</button>
  </div>
  <div class="session-card">
    <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px">&#127939;</div>
    <div>
      <div class="title">Nicholas — 2.1 km</div>
      <div class="sub">22 min · 10:29/km · Coach Sarah</div>
      <div style="display:flex;gap:4px;margin-top:6px">
        <span class="badge badge-teal">New PB</span>
        <span class="badge badge-green">5 sessions</span>
      </div>
    </div>
  </div>
  <div class="session-card">
    <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px">&#127939;</div>
    <div>
      <div class="title">Mei Ling — 1.5 km</div>
      <div class="sub">18 min · 12:00/km</div>
      <div style="display:flex;gap:4px;margin-top:6px">
        <span class="badge badge-red">Feel declining</span>
        <span class="badge badge-amber">Feel: 2</span>
      </div>
    </div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-n">12</div><div class="stat-l">Athletes</div></div>
    <div class="stat"><div class="stat-n">47</div><div class="stat-l">Sessions</div></div>
    <div class="stat"><div class="stat-n">8</div><div class="stat-l">Milestones</div></div>
  </div>
  <div class="card">
    <div class="title" style="margin-bottom:4px">Coaching cues</div>
    <div class="sub">Look ahead, not down. Relax shoulders.</div>
  </div>
  <button class="btn-primary">Log a run</button>
  <div class="nav">
    <div class="nav-item active">Feed</div>
    <div class="nav-item">Athletes</div>
    <div class="nav-item">Profile</div>
    <div class="nav-item">Settings</div>
  </div>
  <script>
    function setMode(m) {
      document.body.className = m;
      document.querySelectorAll('.toggle-bar button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
